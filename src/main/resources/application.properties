spring.application.name=subscriptionbilling

# Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/subscription_billing?useSSL=false&serverTimezone=UTC

spring.datasource.username=root

spring.datasource.password=root

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.com.billing=DEBUG

logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Swagger
springdoc.api-docs.path=/api-docs

springdoc.swagger-ui.path=/swagger-ui.html

springdoc.packages-to-scan=com.billing.controller

# Server
server.port=8080

server.error.include-message=always

# Pagination
billing.pagination.default-page-size=10

billing.pagination.max-page-size=100